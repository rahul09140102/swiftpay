apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-gateway
  namespace: swiftpay
  labels:
    app: transaction-gateway
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels: {app: transaction-gateway}
  strategy:
    type: RollingUpdate
    rollingUpdate: {maxSurge: 1, maxUnavailable: 0}
  template:
    metadata:
      labels: {app: transaction-gateway}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: transaction-gateway
          image: swiftpay/transaction-gateway:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - {containerPort: 8080, name: http}
          envFrom:
            - configMapRef:  {name: swiftpay-config}
            - secretRef:     {name: swiftpay-secrets}
          env:
            - {name: DB_NAME, value: swiftpay_gateway}
          resources:
            requests: {cpu: 250m, memory: 512Mi}
            limits:   {cpu: "1",  memory: 1Gi}
          readinessProbe:
            httpGet: {path: /actuator/health/readiness, port: 8080}
            initialDelaySeconds: 45
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /actuator/health/liveness, port: 8080}
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: transaction-gateway
  namespace: swiftpay
spec:
  type: NodePort
  selector: {app: transaction-gateway}
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: transaction-gateway-hpa
  namespace: swiftpay
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: transaction-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
