apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-service
  namespace: swiftpay
  labels:
    app: ledger-service
spec:
  replicas: 2
  selector:
    matchLabels: {app: ledger-service}
  strategy:
    type: RollingUpdate
    rollingUpdate: {maxSurge: 1, maxUnavailable: 0}
  template:
    metadata:
      labels: {app: ledger-service}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8081"
    spec:
      containers:
        - name: ledger-service
          image: swiftpay/ledger-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - {containerPort: 8081, name: http}
          envFrom:
            - configMapRef:  {name: swiftpay-config}
            - secretRef:     {name: swiftpay-secrets}
          env:
            - {name: DB_NAME,       value: swiftpay_ledger}
            - {name: SERVER_PORT,   value: "8081"}
          resources:
            requests: {cpu: 250m, memory: 512Mi}
            limits:   {cpu: "1",  memory: 1Gi}
          readinessProbe:
            httpGet: {path: /actuator/health/readiness, port: 8081}
            initialDelaySeconds: 45
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /actuator/health/liveness, port: 8081}
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ledger-service
  namespace: swiftpay
spec:
  type: ClusterIP
  selector: {app: ledger-service}
  ports:
    - port: 8081
      targetPort: 8081
